apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'

repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

android {
    namespace "eu.qm.fiszki"
    compileSdkVersion 33
    defaultConfig {
        applicationId "eu.qm.fiszki"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 15
        versionName "1.11"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    productFlavors {
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs/ORMLite')

    implementation('com.mikepenz:materialdrawer:8.4.5') {
        transitive = true
    }

    // Firebase (replaces Fabric Crashlytics)
    implementation platform('com.google.firebase:firebase-bom:32.2.0')
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-analytics'

    // AndroidX (replaces android.support)
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.10.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.viewpager:viewpager:1.0.0'
    implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
    implementation 'androidx.preference:preference:1.2.1'

    implementation 'com.cleveroad:slidingtutorial:1.0.6'
    implementation 'com.afollestad.material-dialogs:core:0.9.6.0'
    implementation 'com.jaredrummler:material-spinner:1.3.1'

    testImplementation 'junit:junit:4.13.2'
}
